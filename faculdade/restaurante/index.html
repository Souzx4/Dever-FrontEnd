<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro de usuario</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Restaurante Delivery</h1>
        <p class="headerP">Bem-vindo ao nosso restaurante delivery, sua fome nossa alegria!</p>
    </header>
    <main>
        <p>Faça seu pedido e aproveite nossa deliciosa comida no conforto da sua casa!</p>

        <input type="email" name="iemail" id="iemail" placeholder="Digite seu email"><br>

        <input type="password" name="isenha" id="isenha" placeholder="Digite sua senha"><br>

        <button type="button">Entrar</button><br>

        <input type="button" value="Criar conta" class="criar">

        <p class="esqueceu"><a href="">esqueceu a sua senha?</a></p>

    </main>
</body>

</html>
